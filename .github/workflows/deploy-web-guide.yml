name: Deploy Web Guide to Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - web-guide/**
      - wiki/**
      - .github/workflows/deploy-web-guide.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build site payload
        run: |
          mkdir -p dist
          cp -R web-guide/* dist/
          cp -R wiki dist/wiki

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
